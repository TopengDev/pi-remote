services:
  attn:
    build: ./attn-core
    container_name: pi-remote-attn
    volumes:
      - attn_data:/root/.attn
      - shared_tmp:/tmp
    restart: unless-stopped

  bot:
    build: ./bot
    container_name: pi-remote-bot
    depends_on:
      - attn
    network_mode: "service:attn"
    volumes:
      - shared_tmp:/tmp
    env_file:
      - .env
    restart: unless-stopped

volumes:
  attn_data:
  shared_tmp:
